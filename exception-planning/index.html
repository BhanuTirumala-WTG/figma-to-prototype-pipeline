    const DataGrid = ({ data, activeThreshold, highlightedRows, highlightedCols, onCellClick, editingCell, setEditingCell, cellValues, setCellValues }) => {

        <div className="flex-1 overflow-hidden border-t border-gray-200">

            <div className="flex-shrink-0 border-r-2 border-gray-300 overflow-y-auto scrollbar-thin" style={{width: 700}}>
              <table className="w-full text-[11px]">

                  {/* Multi-level headers matching Figma */}
                  <tr className="bg-grid-header">
                    <th className="p-2 text-center font-medium text-gray-500 border-b border-r border-grid-border text-[10px]" colSpan={13}>
                      <div className="flex items-center gap-1 justify-center">
                        <span className="text-gray-400">←</span> FY 2024
                      </div>

                  <tr className="bg-grid-header">
                    <th className="border-b border-r border-grid-border" />
                    <th className="p-2 text-center font-medium text-gray-500 border-b border-r border-grid-border text-[10px]" colSpan={12}>

        if (!inputVal.trim()) return;
        const userMsg = inputVal.trim();
        setChatMessages(p => [...p, { role: 'user', text: userMsg }]);
        setInputVal('');
        setIsTyping(true);

        setTimeout(() => {
          let response;
          const lower = userMsg.toLowerCase();
          if (lower.includes('fix') || lower.includes('resolve') || lower.includes('exception')) {
            response = "I can help fix these exceptions. Based on pattern analysis:\n\n**Quick Fixes:**\n• Row 1 (11/04): Copy Finance Plan value → aligns with consensus\n• Row 4 (Nov): Increase forecast by 15% based on seasonal trend\n\n**Bulk Actions:**\n• Select \"Apply ML Correction\" to auto-fix 6 cells across 3 rows\n\nWant me to apply any of these?";

            response = "**Revenue Impact Summary:**\n\n🔴 **Critical:** $14.5K gap in EU Central (Lenovo T14)\n🟠 **High:** $22K potential stockout risk (Thinkpad X1)\n🟡 **Medium:** $8.2K correction needed (Dell Latitude)\n\n**Total at-risk revenue: $44.7K**\n\nApplying all AI suggestions would reduce risk by ~78%.";
          } else if (lower.includes('explain') || lower.includes('why') || lower.includes('root cause')) {
            response = "**Root Cause Analysis:**\n\nThe primary driver is a **timing mismatch** between finance plan updates and demand signals. Key factors:\n\n1. Finance plan was last updated 3 weeks ago\n2. Demand signals shifted +18% due to holiday promotions\n3. Consensus was recalculated but finance wasn't realigned\n\n**Recommendation:** Enable auto-sync between consensus and finance for weekly cadence.";
          } else {
            response = "I can help with:\n• **Fix exceptions** — auto-resolve or suggest corrections\n• **Trend analysis** — identify demand patterns\n• **Impact assessment** — quantify revenue at risk\n• **Root cause** — explain why exceptions occurred\n\nJust ask, or click an insight card to drill into it!";
          }
          setChatMessages(p => [...p, { role: 'assistant', text: response }]);
          setIsTyping(false);
        }, 1200);

                { label: 'High', count: 4, color: 'bg-orange-500' },

                { label: 'Low', count: 2, color: 'bg-yellow-400' }
              ].map(s => (
                <div key={s.label} className="flex items-center gap-1 bg-white rounded-md px-2 py-1 shadow-sm border border-gray-100">

                  <span className="text-[10px] text-gray-600">{s.count} {s.label}</span>
                </div>
              ))}
            </div>
          </div>

                      </span>
                    </div>
                  </div>

                    </div>
                  </div>

            </div>

                {['Fix all exceptions','Show trends','Revenue impact','Root cause'].map(q => (
                  <button key={q} onClick={() => { setInputVal(q); setTimeout(() => { setInputVal(''); setChatMessages(p => [...p, {role:'user',text:q}]); setIsTyping(true); setTimeout(() => { setIsTyping(false); setChatMessages(p => [...p, {role:'assistant',text:`Analyzing "${q}"... Let me look at the data.`}]); }, 1000); }, 100); }}

            <div className="p-3 border-t border-gray-100">
              <div className="flex items-center gap-2 bg-gray-50 rounded-lg border border-gray-200 px-3 py-1.5 focus-within:border-e2open-primary/50 focus-within:ring-2 focus-within:ring-e2open-primary/10">

                  value={inputVal} onChange={e => setInputVal(e.target.value)}

      );
    };

    // ─── AI Notification Banner ────────────────────────────────────
    const AIBanner = ({ show, onDismiss, onOpen }) => {
      if (!show) return null;
      return (
        <div className="mx-5 mt-1 mb-0.5 bg-gradient-to-r from-e2open-primary/5 via-e2open-accent/5 to-purple-50 border border-e2open-primary/15 rounded-lg px-4 py-2 flex items-center justify-between fade-in">
          <div className="flex items-center gap-3">
            <div className="flex items-center justify-center w-8 h-8 bg-gradient-to-br from-e2open-primary to-e2open-accent rounded-lg shadow-sm">
              <Icon name="sparkles" size={15} className="text-white" />
            </div>
            <div>
              <p className="text-xs font-semibold text-gray-800">AI found 4 exception insights with <span className="text-e2open-primary">$44.7K</span> revenue at risk</p>
              <p className="text-[10px] text-gray-500 mt-0.5">3 critical, 4 high severity — 6 cells can be auto-corrected by ML models</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onOpen} className="flex items-center gap-1 bg-e2open-primary text-white px-3 py-1.5 rounded-lg text-[11px] font-medium hover:bg-e2open-primary/90 transition-colors shadow-sm">
              <Icon name="zap" size={12} />
              Review & Fix
            </button>
            <button onClick={onDismiss} className="text-gray-400 hover:text-gray-600 p-1">
              <Icon name="x" size={14} />
            </button>
          </div>
        </div>
      );
    };

    // ─── AI Cell Tooltip ───────────────────────────────────────────
    const AICellTooltip = ({ show, position, cellInfo, onFix, onDismiss }) => {
      if (!show) return null;
      return (
        <div className="fixed z-50 bg-white rounded-xl shadow-2xl border border-gray-200 p-3 w-[280px] fade-in" style={{ top: position.y + 10, left: Math.min(position.x, window.innerWidth - 300) }}>
          <div className="flex items-start gap-2">
            <div className={`w-6 h-6 rounded-lg flex items-center justify-center flex-shrink-0 ${cellInfo.alert === 'critical' ? 'bg-red-100 text-red-600' : cellInfo.alert === 'high' ? 'bg-orange-100 text-orange-600' : cellInfo.alert === 'medium' ? 'bg-amber-100 text-amber-600' : 'bg-yellow-100 text-yellow-600'}`}>
              <Icon name="sparkles" size={13} />
            </div>
            <div className="flex-1">
              <h4 className="text-xs font-semibold text-gray-800">AI Analysis</h4>
              <p className="text-[10px] text-gray-500 mt-1 leading-relaxed">{cellInfo.insight}</p>
              <div className="flex items-center gap-2 mt-2">
                <button onClick={onFix} className="flex items-center gap-1 bg-e2open-primary text-white px-2 py-1 rounded text-[10px] font-medium hover:bg-e2open-primary/90">
                  <Icon name="zap" size={10} />
                  {cellInfo.fixLabel}
                </button>
                <button onClick={onDismiss} className="text-[10px] text-gray-400 hover:text-gray-600">Dismiss</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Main App ──────────────────────────────────────────────────
    const App = () => {
      const [activeThreshold, setActiveThreshold] = useState('All Thresholds');
      const [aiPanelOpen, setAiPanelOpen] = useState(false);
      const [showBanner, setShowBanner] = useState(true);
      const [chartExpanded, setChartExpanded] = useState(false);
      const [toggles, setToggles] = useState({ 'Expand hierarchy': true, 'Expand years': true, 'Expand Quarters': true, 'Expand Months': true });
      const [highlightedRows, setHighlightedRows] = useState([]);
      const [highlightedCols, setHighlightedCols] = useState([]);
      const [activeSuggestion, setActiveSuggestion] = useState(null);
      const [editingCell, setEditingCell] = useState(null);
      const [cellValues, setCellValues] = useState({});
      const [tooltip, setTooltip] = useState({ show: false, position: {x:0,y:0}, cellInfo: {} });
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleCellClick = useCallback((rowId, col, alert) => {
        if (alert) {
          const insights = {
            critical: { insight: 'This cell has a critical variance. The gap between finance and consensus has grown 34% in 3 weeks, driven by demand surge. ML model suggests aligning to consensus value.', fixLabel: 'Auto-align value' },
            high: { insight: 'High variance detected. Demand signals are trending above plan due to seasonal pull-forward. Historical data suggests a 15% forecast adjustment.', fixLabel: 'Adjust +15%' },
            medium: { insight: 'Moderate variance. Finance plan is consistently 18-25% below consensus. Statistical correction available with 85% confidence.', fixLabel: 'Apply correction' },
            low: { insight: 'Low-level variance within acceptable range but trending. Consider pre-emptive adjustment to prevent escalation next period.', fixLabel: 'Pre-emptive fix' }
          };
          setTooltip({
            show: true,
            position: { x: event.clientX, y: event.clientY },
            cellInfo: { ...insights[alert], alert, rowId, col }
          });
        } else {
          setTooltip({ show: false, position: {x:0,y:0}, cellInfo: {} });
          setEditingCell(`${rowId}-${col}`);
        }
      }, []);

      const handleApplySuggestion = useCallback((suggestion) => {
        // Simulate AI applying the fix
        const newValues = { ...cellValues };
        suggestion.affectedRows.forEach(rowId => {
          suggestion.affectedCols.forEach(col => {
            const row = GRID_DATA.find(r => r.id === rowId);
            if (row && row.values[col] !== undefined) {
              // Simulate ML correction: adjust value toward a "corrected" range
              const currentVal = newValues[`${rowId}-${col}`] !== undefined ? newValues[`${rowId}-${col}`] : row.values[col];
              if (currentVal !== null) {
                newValues[`${rowId}-${col}`] = Math.round(currentVal * (suggestion.type === 'critical' ? 0.6 : suggestion.type === 'high' ? 1.15 : suggestion.type === 'medium' ? 1.12 : 0.92));
              }
            }
          });
        });
        setCellValues(newValues);
        setActiveSuggestion(suggestion.id);
        showToast(`Applied "${suggestion.action}" — ${suggestion.impact}`);
        setTimeout(() => setActiveSuggestion(null), 2000);
      }, [cellValues]);

      const handleHighlight = useCallback((rows, cols) => {
        setHighlightedRows(rows);
        setHighlightedCols(cols);
      }, []);

      return (
        <div className="h-screen flex flex-col bg-white overflow-hidden">
          <AppHeader />
          <VersionSwitcher />
          <PageTitle />
          <Toolbar activeThreshold={activeThreshold} setActiveThreshold={setActiveThreshold} onAIToggle={() => { setAiPanelOpen(!aiPanelOpen); setShowBanner(false); }} aiPanelOpen={aiPanelOpen} />
          <QuickFilters toggles={toggles} setToggles={setToggles} />
          <AIBanner show={showBanner && !aiPanelOpen} onDismiss={() => setShowBanner(false)} onOpen={() => { setAiPanelOpen(true); setShowBanner(false); }} />
          <ChartFilterBar expanded={chartExpanded} setExpanded={setChartExpanded} />

          {/* Main content: grid + AI panel */}
          <div className="flex-1 flex min-h-0">
            <DataGrid data={GRID_DATA} activeThreshold={activeThreshold} highlightedRows={highlightedRows} highlightedCols={highlightedCols} onCellClick={handleCellClick} editingCell={editingCell} setEditingCell={setEditingCell} cellValues={cellValues} setCellValues={setCellValues} />
            <AIAssistantPanel open={aiPanelOpen} onClose={() => setAiPanelOpen(false)} suggestions={AI_SUGGESTIONS} onApplySuggestion={handleApplySuggestion} onHighlight={handleHighlight} activeSuggestion={activeSuggestion} />
          </div>

          {/* AI Cell Tooltip */}
          <AICellTooltip show={tooltip.show} position={tooltip.position} cellInfo={tooltip.cellInfo}
            onFix={() => {
              const { rowId, col, alert } = tooltip.cellInfo;
              const row = GRID_DATA.find(r => r.id === rowId);
              if (row) {
                const current = cellValues[`${rowId}-${col}`] !== undefined ? cellValues[`${rowId}-${col}`] : row.values[col];
                if (current !== null) {
                  const factor = alert === 'critical' ? 0.6 : alert === 'high' ? 1.15 : alert === 'medium' ? 1.12 : 0.92;
                  setCellValues(p => ({...p, [`${rowId}-${col}`]: Math.round(current * factor)}));
                  showToast(`Cell corrected using AI analysis`);
                }
              }
              setTooltip({ show: false, position:{x:0,y:0}, cellInfo:{} });
            }}
            onDismiss={() => setTooltip({ show: false, position:{x:0,y:0}, cellInfo:{} })} />

          {/* Toast */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-50 fade-in">
              <div className={`flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-xl border ${toast.type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-blue-50 border-blue-200 text-blue-800'}`}>
                <Icon name={toast.type === 'success' ? 'check' : 'sparkles'} size={14} />
                <span className="text-xs font-medium">{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
