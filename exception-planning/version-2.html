    :root {

      --dec_color_text_label: #282828;
      --dec_color_text_secondary: #6b6b6b;
      --dec_color_text_placeholder: #9e9e9e;
      --dec_color_text_disabled: #b0b0b0;

      --dec_color_surface_secondary: #f7f7f7;
      --dec_color_surface_tertiary: #f0f0f4;

      /* Primary / Brand (Modern Harmony secondary tokens) */
      --dec_color_secondary_strong: #8342bb;
      --dec_color_secondary_foreground: #7239a4;
      --dec_color_brand_base: #282828;
      --dec_color_secondary_light: #f5f0fa;

      /* Secondary (Pill) */
      --dec_color_secondary_base: #e4daef;
      --dec_color_secondary_text: #282828;

      /* Accent / Switch */
      --dec_color_switch_selected: #B9ACE8;
      --dec_color_switch_indicator: #ffffff;

      /* Button Tokens */
      --dec_color_disabled_subtle: #fbfbfb;
      --dec_color_disabled_border: #cccccc;
      --dec_element_hzpadding: 16px;
      --dec_element_vtpadding: 8px;

      /* Grid Tokens */
      --dec_color_header-cell_fill: #f0f0f4;
      --dec_color_grid-cell_border: #e5e5ec;
      --dec_color_grid_alt-row: #fbfbfb;
      --dec_color_grid-input-cell_border: #4b4a5d;
      --dec_grid-cell_hzpadding: 12px;
      --dec_grid-cell_hzmargin: 12px;

      /* Grid Cell Alert Colors (Modern Harmony decision tokens) */
      --dec_color_error_subtle: #fbece9;
      --dec_color_error_foreground: #981e15;
      --dec_color_warning_subtle: #fff4e5;
      --dec_color_warning_foreground: #92400e;
      --dec_color_info_subtle: #fff9e6;
      --dec_color_info_foreground: #854d0e;
      --dec_color_success_subtle: #e8f5e9;
      --dec_color_success_foreground: #1b5e20;

      /* Spacing */
      --core_sp_rem: 4px;
      --core_sp_rem2: 8px;
      --core_sp_rem3: 12px;
      --core_sp_rem4: 16px;
      --core_sp_rem5: 20px;
      --core_sp_rem6: 24px;

      /* Border Radius */
      --dec_base_crn: 8px;
      --dec_pill_crn: 16px;
      --dec_switch_crn: 16px;

      /* Line Heights */
      --line-height-md: 16px;
      --line-height-lg: 20px;
      --line-height-xl: 24px;

      /* Text Sizes */
      --dec_text_size_label_sm: 12px;
      --dec_text_size_label_md: 14px;
      --dec_text_size_body_md: 14px;
      --dec_text_size_heading_xl: 30px;

      /* App Header (Modern Harmony tokens) */
      --dec_color_surface_header: #ffffff;
      --dec_color_div_base: #e5e5ec;
      --dec_app-header_height: 56px;

      font-style: normal;
      font-display: swap;

      font-style: normal;
      font-display: swap;
    }

      font-style: normal;
      font-display: swap;

    * { font-family: var(--core_typeface_switzer); margin: 0; box-sizing: border-box; }
    body { margin: 0; background: var(--dec_color_surface_primary); color: var(--dec_color_text_label); }

    .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #c4c4c4; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .fade-in { animation: fadeIn 0.3s ease-out; }
    .ai-pulse { animation: pulse 2s ease-in-out infinite; }

    .grid-cell:hover { background: var(--dec_color_surface_secondary); }

      color: var(--dec_color_error_foreground);
    }
    .cell-alert-high {

      color: var(--dec_color_warning_foreground);
    }
    .cell-alert-medium {
      background: var(--dec_color_info_subtle);
      color: var(--dec_color_info_foreground);
    }
    .cell-alert-low {
      background: #fefce8;
      color: #854d0e;
    }

      width: 48px;
      height: 24px;
      border-radius: var(--dec_switch_crn);
      padding: 2px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;

    .ds-switch.on { background: var(--dec_color_switch_selected); justify-content: flex-end; }
    .ds-switch.off { background: #c4c4c4; justify-content: flex-start; }
    .ds-switch-knob {
      width: 20px;
      height: 20px;
      border-radius: 20px;
      background: var(--dec_color_switch_indicator);
      box-shadow: 0px 1px 2px 0px rgba(25,34,61,0.12), 0px 1px 3px 0px rgba(25,34,61,0.24);
      display: flex;
      align-items: center;
      justify-content: center;

      font-weight: 500;
      font-size: var(--dec_text_size_label_md);
      line-height: var(--line-height-md);

      border: 1px solid var(--dec_color_disabled_border);
      background: var(--dec_color_disabled_subtle);
      color: var(--dec_color_text_label);
      cursor: pointer;
      transition: all 0.15s;
    }
    .ds-btn:hover { background: #f0f0f0; }
    .ds-btn-primary {
      background: var(--dec_color_secondary_strong);
      color: #ffffff;
      border-color: var(--dec_color_secondary_strong);
    }
    .ds-btn-primary:hover { background: var(--dec_color_secondary_foreground); }

    /* DS Pill */
    .ds-pill {
      font-family: var(--core_typeface_switzer);
      font-weight: 400;
      font-size: var(--dec_text_size_label_sm);
      line-height: var(--line-height-md);
      letter-spacing: 0.07px;
      padding: 4px 12px;
      border-radius: var(--dec_pill_crn);
      border: 1px solid var(--dec_color_secondary_base);
      background: var(--dec_color_secondary_base);
      color: var(--dec_color_secondary_text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .ds-pill.active {
      background: var(--dec_color_secondary_strong);
      color: #ffffff;
      border-color: var(--dec_color_secondary_strong);
    }
    .ds-pill:hover:not(.active) { opacity: 0.8; }

    /* DS Pill variants for thresholds */
    .ds-pill-critical { background: var(--dec_color_error_subtle); border-color: #f5c6c0; color: var(--dec_color_error_foreground); }
    .ds-pill-high { background: var(--dec_color_warning_subtle); border-color: #fde0b0; color: var(--dec_color_warning_foreground); }
    .ds-pill-medium { background: var(--dec_color_info_subtle); border-color: #fde68a; color: var(--dec_color_info_foreground); }

      font-family: var(--core_typeface_switzer);
      font-weight: 500;
      font-size: var(--dec_text_size_label_md);
      line-height: var(--line-height-md);
      letter-spacing: 0.07px;
      color: var(--dec_color_text_label);
      padding: var(--core_sp_rem2) var(--dec_grid-cell_hzmargin);

      font-family: var(--core_typeface_switzer);
      font-weight: 400;
      font-size: var(--dec_text_size_label_md);
      line-height: var(--line-height-md);
      letter-spacing: 0.07px;
      padding: var(--core_sp_rem3) var(--dec_grid-cell_hzpadding);

    /* Version Switcher */
    .version-bar {
      background: var(--dec_color_surface_tertiary);
      border-bottom: 1px solid var(--dec_color_grid-cell_border);
    }
    .version-tab {
      font-family: var(--core_typeface_switzer);

      font-size: var(--dec_text_size_label_sm);
      padding: 6px 16px;
      border-radius: var(--dec_base_crn) var(--dec_base_crn) 0 0;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--dec_color_text_secondary);
      background: transparent;
      border: none;
    }
    .version-tab.active {
      background: var(--dec_color_surface_primary);
      color: var(--dec_color_secondary_strong);
      font-weight: 600;
      box-shadow: 0 -2px 0 0 var(--dec_color_secondary_strong) inset;
    }
    .version-tab:hover:not(.active) {
      color: var(--dec_color_text_label);
      background: rgba(255,255,255,0.5);
    }
  </style>

                    <tr key={row.id} style={{

                        const alert = row.alerts[col];

                        const isHighlighted = highlightedRows.includes(row.id) && highlightedCols.includes(col);
                        const isEditing = editingCell === `${row.id}-${col}`;
                        const alertClass = alert ? getAlertClass(alert) : '';
                        return (
                          <td key={col}
                            className={`ds-data-cell grid-cell ${alertClass} ${isHighlighted ? 'ai-glow' : ''}`}

                              minWidth:90, padding:0, cursor:'pointer', position:'relative',

                                style={{
                                  width:'100%',height:'100%',
                                  padding:'var(--core_sp_rem3) var(--dec_grid-cell_hzpadding)',

                                  background:'var(--dec_color_surface_primary)',
                                  outline:'none',
                                  border:'2px solid var(--dec_color_secondary_strong)',
                                  borderRadius:0

                                  const newVal = e.target.value === '' || e.target.value === '-' ? null : parseInt(e.target.value.replace(/,/g,''));

                                  setEditingCell(null);
                                }}

                                display:'flex',
                                alignItems:'center',

                                  }}>

                                  </span>
                                )}
                              </div>
                            )}

    // ─── AI Assistant Panel ────────────────────────────────────────

              <button onClick={onClose} style={{padding:4,background:'none',border:'none',cursor:'pointer',color:'var(--dec_color_text_secondary)',borderRadius:'var(--dec_base_crn)'}}>

            </div>

            <div style={{display:'flex',gap:8,marginTop:8}}>
              {[

                    </div>

              );

          <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
            <div className="scrollbar-thin" style={{flex:1,overflowY:'auto',padding:12}}>
              {chatMessages.map((msg, i) => (
                <div key={i} className="fade-in" style={{display:'flex',justifyContent:msg.role === 'user' ? 'flex-end' : 'flex-start',marginBottom:12}}>

                    maxWidth:'90%',
                    borderRadius:'var(--dec_base_crn)',
                    padding:'8px 12px',

                    ...(msg.role === 'user'

                    ))}
                  </div>

              ))}
              {isTyping && (
                <div style={{display:'flex',justifyContent:'flex-start'}}>
                  <div style={{background:'var(--dec_color_surface_secondary)',border:'1px solid var(--dec_color_grid-cell_border)',borderRadius:'var(--dec_base_crn)',padding:'8px 12px',borderBottomLeftRadius:0}}>

                      <div className="ai-pulse" style={{width:6,height:6,background:'var(--dec_color_text_secondary)',borderRadius:'50%',animationDelay:'0ms'}} />

                      <div className="ai-pulse" style={{width:6,height:6,background:'var(--dec_color_text_secondary)',borderRadius:'50%',animationDelay:'600ms'}} />
                    </div>
                  </div>

              <div ref={chatEndRef} />

            {/* Quick actions */}
            <div style={{padding:'0 12px 4px'}}>

                    className="ds-pill" style={{fontSize:9,padding:'2px 8px',background:'var(--dec_color_surface_secondary)',borderColor:'var(--dec_color_grid-cell_border)',color:'var(--dec_color_text_secondary)'}}>

    // ─── Main App ──────────────────────────────────────────────────
    const App = () => {
      const [activeThreshold, setActiveThreshold] = useState('All Thresholds');
      const [aiPanelOpen, setAiPanelOpen] = useState(false);
      const [showBanner, setShowBanner] = useState(true);
      const [chartExpanded, setChartExpanded] = useState(false);
      const [toggles, setToggles] = useState({ 'Expand hierarchy': true, 'Expand years': true, 'Expand Quarters': true, 'Expand Months': true });
      const [highlightedRows, setHighlightedRows] = useState([]);
      const [highlightedCols, setHighlightedCols] = useState([]);
      const [activeSuggestion, setActiveSuggestion] = useState(null);
      const [editingCell, setEditingCell] = useState(null);
      const [cellValues, setCellValues] = useState({});
      const [tooltip, setTooltip] = useState({ show: false, position: {x:0,y:0}, cellInfo: {} });
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleCellClick = useCallback((rowId, col, alert, e) => {
        if (alert) {
          const insights = {
            critical: { insight: 'This cell has a critical variance. The gap between finance and consensus has grown 34% in 3 weeks, driven by demand surge. ML model suggests aligning to consensus value.', fixLabel: 'Auto-align value' },
            high: { insight: 'High variance detected. Demand signals are trending above plan due to seasonal pull-forward. Historical data suggests a 15% forecast adjustment.', fixLabel: 'Adjust +15%' },
            medium: { insight: 'Moderate variance. Finance plan is consistently 18-25% below consensus. Statistical correction available with 85% confidence.', fixLabel: 'Apply correction' },
            low: { insight: 'Low-level variance within acceptable range but trending. Consider pre-emptive adjustment to prevent escalation next period.', fixLabel: 'Pre-emptive fix' }
          };
          setTooltip({
            show: true,
            position: { x: e.clientX, y: e.clientY },
            cellInfo: { ...insights[alert], alert, rowId, col }
          });
        } else {
          setTooltip({ show: false, position: {x:0,y:0}, cellInfo: {} });
          setEditingCell(`${rowId}-${col}`);
        }
      }, []);

      const handleApplySuggestion = useCallback((suggestion) => {
        const newValues = { ...cellValues };
        suggestion.affectedRows.forEach(rowId => {
          suggestion.affectedCols.forEach(col => {
            const row = GRID_DATA.find(r => r.id === rowId);
            if (row && row.values[col] !== undefined) {
              const currentVal = newValues[`${rowId}-${col}`] !== undefined ? newValues[`${rowId}-${col}`] : row.values[col];
              if (currentVal !== null) {
                newValues[`${rowId}-${col}`] = Math.round(currentVal * (suggestion.type === 'critical' ? 0.6 : suggestion.type === 'high' ? 1.15 : suggestion.type === 'medium' ? 1.12 : 0.92));
              }
            }
          });
        });
        setCellValues(newValues);
        setActiveSuggestion(suggestion.id);
        showToast(`Applied "${suggestion.action}" — ${suggestion.impact}`);
        setTimeout(() => setActiveSuggestion(null), 2000);
      }, [cellValues]);

      const handleHighlight = useCallback((rows, cols) => {
        setHighlightedRows(rows);
        setHighlightedCols(cols);
      }, []);

      return (
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--dec_color_surface_primary)',overflow:'hidden'}}>
          <AppHeader />
          <VersionSwitcher />
          <PageTitle />
          <Toolbar activeThreshold={activeThreshold} setActiveThreshold={setActiveThreshold} onAIToggle={() => { setAiPanelOpen(!aiPanelOpen); setShowBanner(false); }} aiPanelOpen={aiPanelOpen} />

          <div style={{flex:1,display:'flex',minHeight:0}}>
            <DataGrid data={GRID_DATA} activeThreshold={activeThreshold} highlightedRows={highlightedRows} highlightedCols={highlightedCols} onCellClick={handleCellClick} editingCell={editingCell} setEditingCell={setEditingCell} cellValues={cellValues} setCellValues={setCellValues} />
            <AIAssistantPanel open={aiPanelOpen} onClose={() => setAiPanelOpen(false)} suggestions={AI_SUGGESTIONS} onApplySuggestion={handleApplySuggestion} onHighlight={handleHighlight} activeSuggestion={activeSuggestion} />
          </div>

          <AICellTooltip show={tooltip.show} position={tooltip.position} cellInfo={tooltip.cellInfo}
            onFix={() => {
              const { rowId, col, alert } = tooltip.cellInfo;
              const row = GRID_DATA.find(r => r.id === rowId);
              if (row) {
                const current = cellValues[`${rowId}-${col}`] !== undefined ? cellValues[`${rowId}-${col}`] : row.values[col];
                if (current !== null) {
                  const factor = alert === 'critical' ? 0.6 : alert === 'high' ? 1.15 : alert === 'medium' ? 1.12 : 0.92;
                  setCellValues(p => ({...p, [`${rowId}-${col}`]: Math.round(current * factor)}));
                  showToast(`Cell corrected using AI analysis`);
                }
              }
              setTooltip({ show: false, position:{x:0,y:0}, cellInfo:{} });
            }}
            onDismiss={() => setTooltip({ show: false, position:{x:0,y:0}, cellInfo:{} })} />

          {toast && (
            <div className="fade-in" style={{position:'fixed',bottom:24,right:24,zIndex:50}}>
              <div style={{
                display:'flex',alignItems:'center',gap:8,
                padding:'10px 16px',
                borderRadius:'var(--dec_base_crn)',
                boxShadow:'0 4px 16px rgba(0,0,0,0.12)',
                border:'1px solid var(--dec_color_grid-cell_border)',
                background: toast.type === 'success' ? 'var(--dec_color_success_subtle)' : 'var(--dec_color_secondary_light)',
                color: toast.type === 'success' ? 'var(--dec_color_success_foreground)' : 'var(--dec_color_secondary_strong)',
                fontSize:'var(--dec_text_size_label_sm)',fontWeight:500
              }}>
                <Icon name={toast.type === 'success' ? 'check' : 'sparkles'} size={14} />
                <span>{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
